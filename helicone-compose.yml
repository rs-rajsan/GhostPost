version: '3.8'

services:
  helicone-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: helicone
      POSTGRES_USER: helicone
      POSTGRES_PASSWORD: heliconepassword
    ports:
      - "5433:5432" # Use 5433 to avoid conflict with main project db
    volumes:
      - helicone_db_data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  valhalla:
    image: helicone/valhalla:latest
    ports:
      - "8787:8787"
    environment:
      - DB_HOST=helicone-postgres
      - DB_PORT=5432
      - DB_USER=helicone
      - DB_PASSWORD=heliconepassword
      - DB_NAME=helicone
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - REQUIRE_AUTH=false # Disable authentication as requested
    depends_on:
      - helicone-postgres
      - clickhouse

  helicone-web:
    image: helicone/helicone-web:latest
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=helicone-postgres
      - DB_NAME=helicone
      - DB_USER=helicone
      - DB_PASSWORD=heliconepassword
      - REQUIRE_AUTH=false
      - NEXT_PUBLIC_HELICONE_PROXY_URL=http://localhost:8787
    depends_on:
      - helicone-postgres

volumes:
  helicone_db_data:
  clickhouse_data:
