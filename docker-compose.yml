version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=GostPostDB
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d GostPostDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    restart: always
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@db:5432/GostPostDB?schema=public
      - PORT=5000
    volumes:
      - ./backend:/app
      - ./infrastructure:/app/infrastructure
      - /app/node_modules
    env_file:
      - ./infrastructure/env/.env
    depends_on:
      db:
        condition: service_healthy
    x-develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules/

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    restart: always
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./infrastructure/env/.env
    depends_on:
      - backend
    x-develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/

volumes:
  db_data:
